<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望入力フォーム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F0EEE9;
  --border:#E2DDD6;--border2:#CBC5BC;
  --text:#1A1814;--text2:#6B6560;--text3:#9E9890;
  --accent:#2C5F2E;--accent-bg:#EEF5EE;--accent-bd:#A8C8A8;
  --warn:#7A4A00;--warn-bg:#FFF4E0;--warn-bd:#DFBA80;
  --danger:#7A1A1A;--danger-bg:#FFF0F0;--danger-bd:#E8AAAA;
  --r:10px;--rs:6px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px 56px}
.hdr{text-align:center;margin-bottom:28px}
.logo{display:inline-flex;align-items:center;gap:9px;margin-bottom:6px}
.logo-ic{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center}
.hdr h1{font-size:19px;font-weight:700;letter-spacing:-.3px}
.hdr p{font-size:12px;color:var(--text3);margin-top:2px}
.screen{display:none}.screen.on{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);margin-bottom:12px}
.card-ttl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.field{margin-bottom:16px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px}
input[type=text]{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(44,95,46,.08)}
select{padding:9px 12px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B6560' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px;transition:border-color .15s}
select:focus{border-color:var(--accent)}
.ym-row{display:flex;gap:8px}.ym-row select{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.chip{padding:4px 13px;border:1px solid var(--border2);border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all .12s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent);font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .12s}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.primary:hover{background:#244E26}
.btn.success{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}.btn.success:hover{background:#ddf0dd}
.btn-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.form-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.form-hdr h2{font-size:16px;font-weight:700}
.meta-pill{font-size:11px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bd);padding:3px 10px;border-radius:20px;font-weight:700}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.legsq{width:13px;height:13px;border-radius:3px;flex-shrink:0;border:1px solid}
.bulk-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.blbl{font-size:11px;color:var(--text3);font-weight:700;margin-right:2px}
.bbtn{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .12s}
.bbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.day-grid{display:flex;flex-direction:column;gap:3px}
.drow{border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);overflow:hidden}
.drow.we{background:#FFFAF3;border-color:#EDD8A0}
.drow-top{display:grid;grid-template-columns:66px 1fr;align-items:center;gap:8px;padding:5px 8px}
.dlabel{font-size:13px;font-weight:700;white-space:nowrap}
.wd{font-size:11px;font-weight:400;margin-left:4px;color:var(--text2)}
.wd.sat{color:#1A3F6F}.wd.sun,.wd.hol{color:var(--danger)}
.btn-grp{display:flex;gap:3px;align-items:center}
.dbtn{width:42px;height:28px;border-radius:var(--rs);border:1px solid var(--border2);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--surface2);color:var(--text3);transition:all .1s}
.dbtn:hover{background:var(--surface);color:var(--text)}
.dbtn.ok{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.dbtn.tri{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn)}
.dbtn.ng{background:var(--danger-bg);border-color:var(--danger-bd);color:var(--danger)}
.cmt-wrap{padding:0 8px 7px;display:none}
.cmt-wrap.show{display:block}
.cmt-wrap input{width:100%;padding:5px 9px;font-size:12px;border:1px solid var(--border2);border-radius:var(--rs);font-family:inherit;background:var(--surface);color:var(--text);outline:none}
.cmt-wrap input:focus{border-color:var(--accent)}
.cmt-wrap input::placeholder{color:var(--text3)}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.sum-card{border-radius:var(--rs);padding:10px;text-align:center;border:1px solid}
.sum-card .sl{font-size:11px;font-weight:700;margin-bottom:3px}
.sum-card .sv{font-size:26px;font-weight:700}
.s-ok{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.s-tri{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn)}
.s-ng{background:var(--danger-bg);border-color:var(--danger-bd);color:var(--danger)}
.ctbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.ctbl th,.ctbl td{border:1px solid var(--border);padding:5px 10px;text-align:left}
.ctbl th{background:var(--surface2);font-weight:700;font-size:11px;color:var(--text2)}
.ct-ok{color:var(--accent);font-weight:700}.ct-tri{color:var(--warn);font-weight:700}.ct-ng{color:var(--text3)}
.done-ic{width:50px;height:50px;border-radius:50%;background:var(--accent-bg);border:2px solid var(--accent-bd);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
@media(max-width:400px){.dbtn{width:36px;font-size:13px}.drow-top{grid-template-columns:58px 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">
      <div class="logo-ic">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="3" width="14" height="12" rx="2" stroke="white" stroke-width="1.5"/>
          <path d="M6 2v2M12 2v2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M2 7h14" stroke="white" stroke-width="1.5"/>
          <path d="M5 11h2M9 11h2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>シフト希望入力</h1>
    </div>
    <p>毎月の勤務希望をここから提出してください</p>
  </div>

  <!-- Step 1 -->
  <div class="screen on" id="s1">
    <div class="card">
      <div class="card-ttl">Step 1 — 名前と対象月</div>
      <div class="field">
        <label>名前を選択</label>
        <div class="chips" id="chip-list"></div>
        <input type="text" id="name-inp" placeholder="一覧にない場合は直接入力...">
      </div>
      <div class="field">
        <label>対象月</label>
        <div class="ym-row">
          <select id="sel-year"></select>
          <select id="sel-month"></select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="startForm()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          希望を入力する
        </button>
      </div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="screen" id="s2">
    <div class="form-hdr">
      <h2 id="f-title"></h2>
      <span class="meta-pill" id="f-meta"></span>
    </div>
    <div class="legend">
      <div class="leg"><div class="legsq" style="background:var(--accent-bg);border-color:var(--accent-bd)"></div>○ 出勤可</div>
      <div class="leg"><div class="legsq" style="background:var(--warn-bg);border-color:var(--warn-bd)"></div>△ 条件あり</div>
      <div class="leg"><div class="legsq" style="background:var(--danger-bg);border-color:var(--danger-bd)"></div>× 不可</div>
    </div>
    <div class="bulk-row">
      <span class="blbl">一括:</span>
      <button class="bbtn" onclick="bulk('ok')">全日○</button>
      <button class="bbtn" onclick="bulk('ng')">全日×</button>
      <button class="bbtn" onclick="bulk('wd-ok')">平日○ / 土日×</button>
      <button class="bbtn" onclick="bulk('reset')">リセット</button>
    </div>
    <div class="day-grid" id="day-grid"></div>
    <div class="btn-row">
      <button class="btn primary" onclick="goConfirm()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        内容を確認する
      </button>
      <button class="btn" onclick="show('s1')">← 戻る</button>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="screen" id="s3">
    <div class="card">
      <div style="text-align:center;margin-bottom:16px">
        <div class="done-ic">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 12l6 6L20 6" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div style="font-size:16px;font-weight:700" id="confirm-name"></div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px" id="confirm-period"></div>
      </div>
      <div class="sum-grid" id="sum-grid"></div>
      <table class="ctbl" id="confirm-tbl"></table>
      <div class="btn-row" style="justify-content:center;margin-top:20px">
        <button class="btn success" onclick="doDownload()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4 7l3 3 3-3M2 12h10" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          CSVダウンロード
        </button>
        <button class="btn" onclick="show('s2')">← 修正する</button>
        <button class="btn" onclick="resetAll()">最初に戻る</button>
      </div>
    </div>
  </div>
</div>

<script>
const MEMBERS=['合澤','井柄','植木','藤生','中元','長野','黒川','本田','兼近','坂田','阿志賀','松本','近藤','河口','小島','京田','戸澤','源島','安藤','杉山','星野'];
const WD=['日','月','火','水','木','金','土'];
const HOLS={
  '2026-01':[1],'2026-02':[11,23],'2026-03':[20],'2026-04':[29],
  '2026-05':[3,4,5,6],'2026-06':[],'2026-07':[20],'2026-08':[11],
  '2026-09':[21,22,23],'2026-10':[12],'2026-11':[3,23],'2026-12':[23],
  '2027-01':[1],'2027-02':[11,23],'2027-03':[20],'2027-04':[29],
  '2027-05':[3,4,5,6],'2027-07':[19],'2027-08':[11],
  '2027-09':[20,23],'2027-10':[11],'2027-11':[3,23],'2027-12':[23],
};
let st={name:'',year:0,month:0,days:[]};

function init(){
  document.getElementById('chip-list').innerHTML=
    MEMBERS.map(m=>`<span class="chip" onclick="pickMember(this,'${m}')">${m}</span>`).join('');
  const sy=document.getElementById('sel-year'),sm=document.getElementById('sel-month'),now=new Date();
  for(let y=now.getFullYear();y<=now.getFullYear()+1;y++){
    const o=document.createElement('option');o.value=y;o.textContent=y+'年';
    if(y===now.getFullYear())o.selected=true;sy.appendChild(o);
  }
  for(let m=1;m<=12;m++){
    const o=document.createElement('option');o.value=m;o.textContent=m+'月';
    const nx=(now.getMonth()+2>12)?1:now.getMonth()+2;
    if(m===nx)o.selected=true;sm.appendChild(o);
  }
  document.getElementById('name-inp').addEventListener('input',function(){
    st.name=this.value.trim();
    document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.textContent===st.name));
  });
}

function pickMember(el,name){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');st.name=name;
  document.getElementById('name-inp').value=name;
}

function buildDays(y,m){
  const total=new Date(y,m,0).getDate(),key=`${y}-${String(m).padStart(2,'0')}`,hols=HOLS[key]||[];
  return Array.from({length:total},(_,i)=>{
    const d=i+1,wdi=new Date(y,m-1,d).getDay(),isH=hols.includes(d),isWe=wdi===0||wdi===6||isH;
    return{d,wdi,isH,isWe,s:'ng',comment:''};
  });
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('on',s.id===id));
  window.scrollTo({top:0,behavior:'smooth'});
}

function startForm(){
  st.name=document.getElementById('name-inp').value.trim();
  if(!st.name){alert('名前を入力または選択してください');return;}
  st.year=parseInt(document.getElementById('sel-year').value);
  st.month=parseInt(document.getElementById('sel-month').value);
  st.days=buildDays(st.year,st.month);
  document.getElementById('f-title').textContent=`${st.month}月 シフト希望`;
  document.getElementById('f-meta').textContent=`${st.name} / ${st.year}年${st.month}月`;
  renderGrid();show('s2');
}

function renderGrid(){
  document.getElementById('day-grid').innerHTML=st.days.map((d,i)=>{
    const wl=WD[d.wdi]+(d.isH?'祝':''),wcl=d.wdi===6?'sat':(d.wdi===0||d.isH)?'sun':'';
    const showC=d.s==='ok'||d.s==='tri';
    const ph=d.s==='tri'?'例: 9:00〜12:00、午前のみ など':'例: 9:00〜17:00';
    return`<div class="${d.isWe?'drow we':'drow'}">
      <div class="drow-top">
        <div class="dlabel">${st.month}/${d.d}<span class="wd ${wcl}">${wl}</span></div>
        <div class="btn-grp">
          <button class="dbtn${d.s==='ok'?' ok':''}" onclick="setD(${i},'ok')">○</button>
          <button class="dbtn${d.s==='tri'?' tri':''}" onclick="setD(${i},'tri')">△</button>
          <button class="dbtn${d.s==='ng'?' ng':''}" onclick="setD(${i},'ng')">×</button>
        </div>
      </div>
      <div class="cmt-wrap${showC?' show':''}" id="cw-${i}">
        <input type="text" placeholder="${ph}" value="${d.comment}" oninput="setC(${i},this.value)">
      </div>
    </div>`;
  }).join('');
}

function setD(i,s){
  st.days[i].s=s;
  const row=document.querySelectorAll('.drow')[i];
  row.querySelectorAll('.dbtn').forEach((b,j)=>b.classList.toggle(['ok','tri','ng'][j],j===['ok','tri','ng'].indexOf(s)));
  const cw=document.getElementById(`cw-${i}`);
  if(s==='ng'){cw.classList.remove('show');st.days[i].comment='';cw.querySelector('input').value='';}
  else{cw.classList.add('show');cw.querySelector('input').placeholder=s==='tri'?'例: 9:00〜12:00、午前のみ など':'例: 9:00〜17:00';}
}

function setC(i,val){st.days[i].comment=val;}

function bulk(mode){
  st.days.forEach(d=>{
    if(mode==='ok')d.s='ok';
    else if(mode==='ng'||mode==='reset'){d.s='ng';d.comment='';}
    else if(mode==='wd-ok'){d.s=d.isWe?'ng':'ok';if(d.isWe)d.comment='';}
  });
  renderGrid();
}

function goConfirm(){
  const SL={ok:'○',tri:'△',ng:'×'};
  const okN=st.days.filter(d=>d.s==='ok').length,triN=st.days.filter(d=>d.s==='tri').length,ngN=st.days.filter(d=>d.s==='ng').length;
  document.getElementById('confirm-name').textContent=st.name+' さん';
  document.getElementById('confirm-period').textContent=`${st.year}年${st.month}月（全${st.days.length}日）`;
  document.getElementById('sum-grid').innerHTML=
    `<div class="sum-card s-ok"><div class="sl">○ 出勤可</div><div class="sv">${okN}</div></div>`+
    `<div class="sum-card s-tri"><div class="sl">△ 条件付き</div><div class="sv">${triN}</div></div>`+
    `<div class="sum-card s-ng"><div class="sl">× 不可</div><div class="sv">${ngN}</div></div>`;
  const rows=st.days.map(d=>{
    const wl=WD[d.wdi]+(d.isH?'祝':''),cls=d.s==='ok'?'ct-ok':d.s==='tri'?'ct-tri':'ct-ng';
    const val=SL[d.s]+(d.comment?' '+d.comment:'');
    return`<tr><td>${st.month}/${d.d}（${wl}）</td><td class="${cls}">${val}</td></tr>`;
  }).join('');
  document.getElementById('confirm-tbl').innerHTML=
    `<thead><tr><th>日付</th><th>希望</th></tr></thead><tbody>${rows}</tbody>`;
  show('s3');
}

function doDownload(){
  const SL={ok:'○',tri:'△',ng:'×'},m=String(st.month).padStart(2,'0');
  const hdrs=['タイムスタンプ','名前'];
  st.days.forEach(d=>{const wl=WD[d.wdi]+(d.isH?'（祝）':'');hdrs.push(`${st.month}/${d.d}（${wl}）希望（ 例：◯ / × △ orコメント）`);});
  const vals=[new Date().toLocaleString('ja-JP'),st.name];
  st.days.forEach(d=>vals.push(d.comment?`${SL[d.s]}${d.comment}`:SL[d.s]));
  const csv=[hdrs,vals].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`シフト希望_${st.name}_${st.year}${m}.csv`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

function resetAll(){
  st={name:'',year:0,month:0,days:[]};
  document.getElementById('name-inp').value='';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  show('s1');
}

init();
</script>
</body>
</html>
